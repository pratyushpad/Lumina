[tool.ruff]
line-length = 100
# Floor is the local dev venv (3.10); CI and the Docker images run 3.11.
target-version = "py310"
extend-exclude = [".venv", "alembic/versions", "storage"]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "F",    # pyflakes (undefined names, unused imports/vars)
    "I",    # import sorting
    "UP",   # pyupgrade
    "B",    # bugbear (mutable defaults, shadowed loop vars, ...)
    "C4",   # comprehension simplifications
    "ASYNC",# blocking calls inside async defs
]
ignore = [
    "B008",  # FastAPI's Depends()/File() defaults are the framework's idiom
    "E501",  # line length is formatter's job; long comments/URLs are fine
]

[tool.ruff.lint.per-file-ignores]
# CLI wrappers must extend sys.path before importing app modules.
"scripts/*.py" = ["E402"]
"tests/*.py" = ["B011"]

[tool.ruff.lint.isort]
known-first-party = ["app"]

# pytest config lives in pytest.ini (it takes precedence over pyproject.toml,
# so duplicating it here would create dead config).
